name: дёЉеё‚йЃёи‚Ўзі»зµ± v2.0 жЇЏж—Ґи‡Єе‹•еџ·иЎЊ
on:
  schedule:
    - cron: '49 06 * * 1-5'
  workflow_dispatch:
jobs:
  run-scanner:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: еЏ–е‡єзЁ‹ејЏзўј
        uses: actions/checkout@v4

      - name: е®‰иЈќдё­ж–‡е­—ећ‹
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q fonts-noto-cjk
          fc-cache -fv

      - name: иЁ­е®љ Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: е®‰иЈќ Python еҐ—д»¶
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: еџ·иЎЊдёЉеё‚йЃёи‚Ўзі»зµ±
        env:
          FINMIND_TOKEN_1:  ${{ secrets.FINMIND_TOKEN_1 }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:       ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:   ${{ secrets.GMAIL_APP_PASS }}
          EMAIL_TO:         ${{ secrets.EMAIL_TO }}
          REPORT_URL:       ${{ secrets.REPORT_URL }}
          TSE_CSV_PATH:     stock_list.csv
        run: python tse_scanner.py

      - name: жЋЁйЂЃијёе‡єжЄ”е€°еЂ‰еє«
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p output docs

          # жЉЉ HTML и¤‡иЈЅз‚є index.htmlпј€GitHub Pages и®ЂйЂ™иЈЎпј‰
          NEW_HTML=$(ls output/TSE_report_*.html 2>/dev/null | head -1)
          if [ -n "$NEW_HTML" ]; then
            cp "$NEW_HTML" docs/index.html
          fi

          # жё…жЋ‰и€Љ CSV
          git rm -f output/tse_*.csv 2>/dev/null || true
          git rm -f output/Twgogogo_*.csv 2>/dev/null || true

          # еЉ е…ҐжњЂж–° CSV
          LATEST_CSV=$(ls output/tse_*.csv 2>/dev/null | head -1)
          [ -n "$LATEST_CSV" ] && git add "$LATEST_CSV"

          # еЉ е…Ґ GitHub Pages HTML
          git add docs/index.html 2>/dev/null || true

          git diff --cached --quiet || git commit -m "Update: дёЉеё‚йЃёи‚Ўе ±е‘Љ $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push

      - name: жЋЁйЂЃCSVе€°stock-database
        env:
          REPO_C_TOKEN: ${{ secrets.REPO_C_TOKEN }}
        run: |
          git clone https://x-access-token:${REPO_C_TOKEN}@github.com/flydav003-alt/stock-database.git repo_c
          mkdir -p repo_c/data
          cp output/tse_*.csv repo_c/data/
          cd repo_c
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "ж–°еўћ TSE $(date '+%Y%m%d') CSV"
          git push
