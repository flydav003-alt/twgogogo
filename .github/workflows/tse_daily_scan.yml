name: 上市選股系統 v2.0 每日自動執行

on:
  schedule:
    - cron: '38 07 * * 1-5'
  workflow_dispatch:

jobs:
  run-scanner:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 安裝中文字型
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q fonts-noto-cjk
          fc-cache -fv

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝 Python 套件
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 執行上市選股系統
        env:
          FINMIND_TOKEN_1:  ${{ secrets.FINMIND_TOKEN_1 }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:       ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:   ${{ secrets.GMAIL_APP_PASS }}
          EMAIL_TO:         ${{ secrets.EMAIL_TO }}
          REPORT_URL:       ${{ secrets.REPORT_URL }}
          TSE_CSV_PATH:     stock_list.csv
        run: python tse_scanner.py

      - name: 推送輸出檔到倉庫
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p output docs
          NEW_HTML=$(ls output/TSE_report_*.html 2>/dev/null | head -1)
          if [ -n "$NEW_HTML" ]; then
            cp "$NEW_HTML" docs/index.html
          fi
          git rm -f output/tse_*.csv 2>/dev/null || true
          git rm -f output/Twgogogo_*.csv 2>/dev/null || true
          LATEST_CSV=$(ls output/tse_*.csv 2>/dev/null | head -1)
          [ -n "$LATEST_CSV" ] && git add "$LATEST_CSV"
          git add docs/index.html 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update: 上市選股報告 $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push

      - name: 推送CSV到stock-database
        env:
          REPO_C_TOKEN: ${{ secrets.REPO_C_TOKEN }}
        run: |
          git clone https://x-access-token:${REPO_C_TOKEN}@github.com/flydav003-alt/stock-database.git repo_c
          mkdir -p repo_c/data
          cp output/tse_*.csv repo_c/data/
          cd repo_c
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "新增 TSE $(date '+%Y%m%d') CSV"
          git push

      # ── 推送 TSE CSV 到 BT repo（data/input/）────────────
      - name: 推送 TSE CSV 到 BT repo
        env:
          BT_REPO_TOKEN: ${{ secrets.BT_REPO_TOKEN }}
        run: |
          TSE_CSV=$(ls output/tse_*.csv 2>/dev/null | sort | tail -1)
          if [ -z "$TSE_CSV" ]; then
            echo "⚠️ 找不到 TSE CSV，跳過"
            exit 0
          fi
          TSE_NAME=$(basename "$TSE_CSV")
          echo "推送 $TSE_NAME 到 flydav003-alt/BT ..."
          git clone https://x-access-token:${BT_REPO_TOKEN}@github.com/flydav003-alt/BT.git bt_repo_tse
          cd bt_repo_tse
          mkdir -p data/input
          cp ../$TSE_CSV data/input/$TSE_NAME
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "data/input/$TSE_NAME"
          git diff --staged --quiet \
            && echo "BT repo 無變更，跳過 push" \
            || { git commit -m "📊 TSE選股排行 $TSE_NAME"; git push; echo "✓ 推送完成"; }

      # ── 通知 BT repo 觸發 K線評分 workflow ───────────────
      - name: 通知 BT repo 執行 TSE 評分
        env:
          BT_REPO_TOKEN: ${{ secrets.BT_REPO_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${BT_REPO_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/flydav003-alt/BT/dispatches \
            -d '{"event_type":"csv-tse-updated","client_payload":{"source":"tse-repo"}}' \
            && echo "✓ 已通知 BT repo 觸發 TSE 評分" \
            || echo "⚠️ 通知失敗（不影響主流程）"
