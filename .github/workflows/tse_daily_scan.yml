name: 上市選股系統 v2.0 每日自動執行
on:
  schedule:
    - cron: '52 09 * * 1-5'
  workflow_dispatch:
jobs:
  run-scanner:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4
      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 安裝套件
        run: pip install --upgrade pip && pip install - requirements.txt
      - name: 執行選股
        env:
          FINMIND_TOKEN_1:  ${{ secrets.FINMIND_TOKEN_1 }}
          FINMIND_TOKEN_2:  ${{ secrets.FINMIND_TOKEN_2 }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:       ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:   ${{ secrets.GMAIL_APP_PASS }}
          EMAIL_TO:         ${{ secrets.EMAIL_TO }}
          REPORT_URL:       ${{ secrets.REPORT_URL }}
          TSE_CSV_PATH:     stock_list.csv
        run: python tse_scanner.py
      - name: 推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p output
          git rm -f output/Twgogogo_*.csv 2>/dev/null || true
          LATEST=$(ls output/Twgogogo_*.csv 2>/dev/null | head -1)
          [ -n "$LATEST" ] && git add "$LATEST"
          git diff --cached --quiet || git commit -m "Update: 上市選股 $(date +'%Y-%m-%d')"
          git push
